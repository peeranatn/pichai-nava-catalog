<html lang="th">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .vessel-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        .pair-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Header -->
    <header class="bg-blue-900 text-white py-10 px-4 shadow-lg">

        </div>

    <!-- Search & Filter -->
    <div class="container mx-auto px-4 -mt-8">
        <div class="bg-white rounded-xl shadow-md p-6 flex flex-col md:flex-row gap-4 items-center">
            <div class="relative w-full md:w-1/2">

                <svg class="w-6 h-6 absolute left-3 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <div class="flex w-full md:w-1/2 gap-3">

                    <button id="filterPair" class="flex-1 px-3 py-2 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition">เรือคู่</button>
                    <button id="filterSingle" class="flex-1 px-3 py-2 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition">เรือเดี่ยว</button>
                </div>
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button id="gridViewBtn" class="p-2 rounded-md text-gray-400 hover:text-gray-600" title="Grid View">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    </button>
                    <button id="listViewBtn" class="p-2 rounded-md bg-white shadow-sm text-blue-600" title="List View">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Vessel Grid/List Container -->
    <main class="container mx-auto px-4 py-12">
        <div id="vesselContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Cards or List will be injected here by JS -->
        </div>
        
        <div id="noResults" class="hidden text-center py-20">
            <p class="text-gray-500 text-xl">ไม่พบข้อมูลที่ค้นหา</p>
        </div>
    </main>

    <!-- Contact CTA -->
    <footer class="bg-white border-t border-gray-200 py-12 px-4 mt-12">
        <div class="container mx-auto text-center">

                </div>
            </div>
            <p class="mt-8 text-gray-400 text-sm">© 2026 Pichai Nava Exit Fleet Liquidation. All rights reserved.</p>
        </div>
    </footer>

                        </button>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        ${vesselPanel(pla, 'เรือปลา')}
                        ${vesselPanel(hu, 'เรือหู')}
                    </div>

                </div>`;
            const modal = document.getElementById('pairModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closePairModal(event) {
            if (event && event.currentTarget !== event.target) return;
            const modal = document.getElementById('pairModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }

        const vesselCache = {};

        function openVesselModal(key) {
            const v = vesselCache[key];
            if (!v) return;
            const isSold = v['สถานะ'] === 'Sold';
            const price = v['ราคาตั้งขาย (Base)'];
            document.getElementById('pairModalContent').innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-start mb-5">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-gray-700 text-white px-3 py-1 rounded-full text-sm font-bold">เรือเดี่ยว</span>
                            </div>
                            <h3 class="text-2xl font-bold text-gray-900 mb-2">${v['ชื่อเรือ']}</h3>
                            <span class="text-2xl font-bold ${isSold ? 'text-red-600' : 'text-blue-600'}">${isSold ? 'ขายแล้ว (SOLD)' : formatPrice(price)}</span>
                            <div class="mt-2"><span class="inline-flex items-center gap-1 bg-green-50 text-green-700 border border-green-200 px-2 py-0.5 rounded-full text-xs font-semibold whitespace-nowrap"><svg class="w-3 h-3 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>ใบอนุญาตประมงพาณิชย์ ถึง 31/03/2571</span></div>
                        </div>
                        <button onclick="closePairModal()" class="text-gray-400 hover:text-gray-600 p-2 rounded-lg hover:bg-gray-100 transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-5 border border-gray-200">
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">เลขทะเบียน</span><span class="font-medium text-gray-800">${v['เลขทะเบียน'] || '-'}</span></div>
                            <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">ตันกรอส</span><span class="font-medium text-gray-800">${v['ตันกรอส'] || '-'}</span></div>
                            <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">ตันเนต</span><span class="font-medium text-gray-800">${v['ตันเนต'] || '-'}</span></div>
                            <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">เครื่องยนต์</span><span class="font-medium text-gray-800">${v['เครื่อง'] || '-'}</span></div>
                            <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">แรงม้า</span><span class="font-medium text-gray-800">${v['แรงม้า/กว.'] || '-'}</span></div>
                            <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">เจ้าของ</span><span class="font-medium text-gray-800">${v['เจ้าของเรือ'] || '-'}</span></div>
                            <div class="flex justify-between items-center"><span class="text-gray-500">เลขเครื่อง</span><span class="font-medium text-gray-800">${v['เลขเครื่อง'] || '-'}</span></div>
                        </div>
                    </div>
                </div>`;
            const modal = document.getElementById('pairModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }


        function formatPrice(price) {
            if (!price) return 'ติดต่อสอบถาม';
            return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', maximumFractionDigits: 0 }).format(price);
        }

        function getStatusBadge(status) {
            if (status === 'Sold') return '<span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-red-100 text-red-800">ขายแล้ว</span>';
            return '';
        }

        function createCard(vessel) {
            const key = 'vessel-' + Math.round(vessel['ลำดับ']);
            vesselCache[key] = vessel;
            const isSold = vessel['สถานะ'] === 'Sold';
            const priceHtml = isSold 
                ? '<span class="text-red-600 font-bold uppercase tracking-wider">ขายแล้ว (SOLD)</span>'
                : `<span class="text-blue-600 font-bold text-lg">${formatPrice(vessel['ราคาตั้งขาย (Base)'])}</span>`;
            
            return `
                <div class="vessel-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col cursor-pointer ${isSold ? 'opacity-75 grayscale-[0.3]' : ''}" onclick="openVesselModal('${key}')">
                    <div class="h-48 bg-blue-100 flex items-center justify-center relative">
                        <svg class="w-20 h-20 text-blue-300" fill="currentColor" viewBox="0 0 24 24"><path d="M20 21c-1.39 0-2.78-.47-4-1.32-2.44 1.71-5.56 1.71-8 0C6.78 20.53 5.39 21 4 21H2v2h2c1.38 0 2.74-.35 4-.99 2.52 1.29 5.48 1.29 8 0 1.26.65 2.62.99 4 .99h2v-2h-2zM3.95 19H4c1.6 0 3.02-.88 4-2.12 1.98 2.48 5.02 2.48 7 0 .98 1.24 2.4 2.12 4 2.12h.05L21 14l-2.1-7h-2.1L12 2 5.2 7H3.1L1 14l2.95 5zM12 5.19l2.7 2.81H9.3L12 5.19zM4.6 14l1.5-5h11.8l1.5 5H4.6z"/></svg>
                        ${isSold ? '<div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-40"><span class="bg-red-600 text-white px-6 py-2 rounded-full font-bold text-xl uppercase tracking-widest">ขายแล้ว</span></div>' : ''}
                        <div class="absolute top-4 right-4">
                            ${getStatusBadge(vessel['สถานะ'])}
                        </div>
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900">${vessel['ชื่อเรือ']}</h3>
                                <p class="text-gray-500 text-sm">ประเภท: ${vessel['ประเภทเรือ'] || '-'}</p>
                            </div>
                            ${priceHtml}
                        </div>
                        <div class="space-y-2 text-sm text-gray-600 mb-6 flex-grow">
                            <div class="flex justify-between border-b border-gray-50 pb-1">
                                <span>เลขทะเบียน:</span>
                                <span class="font-medium text-gray-800">${vessel['เลขทะเบียน'] || '-'}</span>
                            </div>
                            <div class="flex justify-between border-b border-gray-50 pb-1">
                                <span>ขนาด (ตันกรอส):</span>
                                <span class="font-medium text-gray-800">${vessel['ตันกรอส'] || '-'}</span>
                            </div>
                            <div class="flex justify-between border-b border-gray-50 pb-1">
                                <span>เครื่องยนต์:</span>
                                <span class="font-medium text-gray-800">${vessel['เครื่อง'] || '-'}</span>
                            </div>
                        </div>
                        <div class="mb-4"><span class="inline-flex items-center gap-1 bg-green-50 text-green-700 border border-green-200 px-2 py-0.5 rounded-full text-xs font-semibold whitespace-nowrap"><svg class="w-3 h-3 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>ใบอนุญาตประมงพาณิชย์ ถึง 31/03/2571</span></div>
                        <button type="button" class="w-full bg-gray-900 hover:bg-black text-white py-3 rounded-xl font-medium transition flex items-center justify-center gap-2">
                            <span>ดูรายละเอียด</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            `;
        }

        function createListRow(vessel) {
            const key = 'vessel-' + Math.round(vessel['ลำดับ']);
            vesselCache[key] = vessel;
            const isSold = vessel['สถานะ'] === 'Sold';
            const priceHtml = isSold 
                ? '<span class="text-red-600 font-bold uppercase text-xs tracking-wider">ขายแล้ว (SOLD)</span>'
                : `<span class="font-bold text-blue-600">${formatPrice(vessel['ราคาตั้งขาย (Base)'])}</span>`;
                
            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-gray-300 flex flex-col md:flex-row items-center gap-4 cursor-pointer transition ${isSold ? 'opacity-75 grayscale-[0.3]' : ''}" onclick="openVesselModal('${key}')">
                    <div class="w-12 h-12 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                        <svg class="w-6 h-6 text-blue-300" fill="currentColor" viewBox="0 0 24 24"><path d="M20 21c-1.39 0-2.78-.47-4-1.32-2.44 1.71-5.56 1.71-8 0C6.78 20.53 5.39 21 4 21H2v2h2c1.38 0 2.74-.35 4-.99 2.52 1.29 5.48 1.29 8 0 1.26.65 2.62.99 4 .99h2v-2h-2zM3.95 19H4c1.6 0 3.02-.88 4-2.12 1.98 2.48 5.02 2.48 7 0 .98 1.24 2.4 2.12 4 2.12h.05L21 14l-2.1-7h-2.1L12 2 5.2 7H3.1L1 14l2.95 5zM12 5.19l2.7 2.81H9.3L12 5.19zM4.6 14l1.5-5h11.8l1.5 5H4.6z"/></svg>
                    </div>
                    <div class="flex-grow grid grid-cols-2 md:grid-cols-4 gap-4 items-center w-full">
                        <div>
                            <h3 class="font-bold text-gray-900">${vessel['ชื่อเรือ']}</h3>
                            <p class="text-xs text-gray-500">${vessel['เลขทะเบียน'] || '-'}</p>
                        </div>
                        <div class="text-sm">
                            <p class="text-gray-400 text-xs uppercase font-bold tracking-tighter">ประเภท</p>
                            <p class="font-medium">${vessel['ประเภทเรือ'] || '-'}</p>
                        </div>
                        <div class="text-sm">
                            <p class="text-gray-400 text-xs uppercase font-bold tracking-tighter">เครื่องยนต์</p>
                            <p class="font-medium truncate" title="${vessel['เครื่อง']}">${vessel['เครื่อง'] || '-'}</p>
                        </div>
                        <div class="text-sm text-right md:text-left">
                            <p class="text-gray-400 text-xs uppercase font-bold tracking-tighter">ราคา</p>
                            ${priceHtml}
                        </div>
                    </div>
                    <span class="inline-flex items-center gap-1 bg-green-50 text-green-700 border border-green-200 px-2.5 py-1 rounded-full text-xs font-semibold whitespace-nowrap shrink-0"><svg class="w-3 h-3 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>ใบอนุญาตประมงพาณิชย์ ถึง 31/03/2571</span>
                    <button type="button" class="w-full md:w-auto bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm font-medium transition">
                        รายละเอียด
                    </button>
                </div>
            `;
        }

        function render(items) {
            if (items.length === 0) {
                container.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');
            if (currentView === 'grid') {
                container.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8";
                container.innerHTML = items.map(item => item.type === 'pair' ? createPairCard(item) : createCard(item)).join('');
            } else {
                container.className = "flex flex-col gap-3";
                container.innerHTML = items.map(item => item.type === 'pair' ? createPairListRow(item) : createListRow(item)).join('');
            }
        }

        function filter() {
            const query = (searchInput.value || '').toLowerCase();
            const allItems = buildDisplayItems(vessels).filter(item =>
                item.type === 'pair'
                    ? getPairStatus(item.pla, item.hu) !== 'Sold'
                    : item['สถานะ'] !== 'Sold'
            );

            const filteredItems = allItems.filter(item => {
                if (currentTypeFilter === 'pair' && item.type !== 'pair') return false;
                if (currentTypeFilter === 'single' && item.type === 'pair') return false;
                if (!query) return true;
                if (item.type === 'pair') {
                    return (item.pla?.['ชื่อเรือ'] || '').toLowerCase().includes(query) ||
                           (item.hu?.['ชื่อเรือ'] || '').toLowerCase().includes(query) ||
                           (item.pla?.['เครื่อง'] || '').toLowerCase().includes(query);
                }
                return (item['ชื่อเรือ'] || '').toLowerCase().includes(query) ||
                       (item['เครื่อง'] || '').toLowerCase().includes(query) ||
                       (item['ประเภทเรือ'] || '').toLowerCase().includes(query);
            });

            render(filteredItems);
        }

        function setViewBtn(view) {
            currentView = view;
            const isGrid = view === 'grid';
            gridViewBtn.classList.toggle('bg-white', isGrid);
            gridViewBtn.classList.toggle('shadow-sm', isGrid);
            gridViewBtn.classList.toggle('text-blue-600', isGrid);
            gridViewBtn.classList.toggle('text-gray-400', !isGrid);
            listViewBtn.classList.toggle('bg-white', !isGrid);
            listViewBtn.classList.toggle('shadow-sm', !isGrid);
            listViewBtn.classList.toggle('text-blue-600', !isGrid);
            listViewBtn.classList.toggle('text-gray-400', isGrid);
        }

        function setTypeFilter(type) {
            currentTypeFilter = type;
            [filterAll, filterPair, filterSingle].forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
                btn.classList.add('text-gray-500');
            });
            const active = type === 'all' ? filterAll : type === 'pair' ? filterPair : filterSingle;
            active.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            active.classList.remove('text-gray-500');
        }

        gridViewBtn.addEventListener('click', () => { setViewBtn('grid'); filter(); });
        listViewBtn.addEventListener('click', () => { setViewBtn('list'); filter(); });
        filterAll.addEventListener('click', () => { setTypeFilter('all'); filter(); });
        filterPair.addEventListener('click', () => { setTypeFilter('pair'); filter(); });
        filterSingle.addEventListener('click', () => { setTypeFilter('single'); filter(); });
        searchInput.addEventListener('input', filter);

        // Initial render
        filter();
    </script>
</body>
</html>
